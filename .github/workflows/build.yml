name: Build OriginSMS

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore correct Gradle files
        run: |
          python3 -c "import base64; open('settings.gradle.kts','wb').write(base64.b64decode(''))"
          python3 -c "import base64; open('build.gradle.kts','wb').write(base64.b64decode(''))"
          python3 -c "import base64; open('app/build.gradle.kts','wb').write(base64.b64decode(''))"
          echo "=== settings.gradle.kts ===" && head -5 settings.gradle.kts
          echo "=== build.gradle.kts ===" && head -3 build.gradle.kts

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OriginSMS-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
